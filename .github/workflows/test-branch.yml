name: Check & Test latest parsers

on:
    push:
        branches:
            - master

jobs:
    check-and-build:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository 🌏
                uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

            -   name: Set up Java enviroment 🔧
                uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5 # v5.2.0
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Set up Gradle enviroment 📦
                uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
                with:
                    gradle-version: '9.3.1'

            -   name: Compile the library 🚀
                run: ./gradlew compileKotlin
